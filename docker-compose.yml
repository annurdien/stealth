services:
  stealth:
    build: .
    container_name: stealth
    shm_size: '512m'
    restart: unless-stopped
    ports:
      - "8191:8191"
    environment:
      - HOST=0.0.0.0
      - PORT=8191
      - HEADLESS=true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8191/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
